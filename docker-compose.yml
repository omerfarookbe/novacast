networks:
  novacast-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:

services:

  postgres:
    image: postgres:16
    container_name: novacast-postgres
    environment:
      POSTGRES_DB: novacast
      POSTGRES_USER: novacast_user
      POSTGRES_PASSWORD: novacast_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - novacast-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novacast_user -d novacast"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: novacast-pgbouncer
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: novacast
      DB_USER: novacast_user
      DB_PASSWORD: novacast_pass
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novacast-network

  redis:
    image: redis:7-alpine
    container_name: novacast-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - novacast-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: novacast-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: 1X6f2SUuTSa4XFhyLkLnLw
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - novacast-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: novacast-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: novacast-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - novacast-network
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: novacast-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@novacast.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - novacast-network
  redisinsight:
    image: redis/redisinsight:latest
    container_name: novacast-redisinsight
    ports:
      - "5540:5540"
    depends_on:
      - redis
    networks:
      - novacast-network